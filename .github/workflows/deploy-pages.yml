name: Enable GitHub Pages

on:
  push:
    branches: [main]

jobs:
  enable:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    steps:
      - name: Ping
        run: echo "Actions runner is working"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enables if not active)
        uses: actions/configure-pages@v5
        with:
          enablement: true
